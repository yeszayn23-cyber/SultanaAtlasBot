<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أطلس السلطانة | طريق القوافل</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@700&display=swap');
        
        :root { --gold: #d4af37; --emerald: #013220; --sand: #f4ece1; --accent: #a52a2a; }

        body { 
            font-family: 'Amiri', serif; margin: 0; padding: 0; 
            background: var(--sand) no-repeat center center fixed; background-size: cover;
            color: var(--emerald); transition: 0.5s;
        }

        .status-bar {
            background: rgba(1, 50, 32, 0.9); color: var(--gold);
            padding: 10px; display: flex; justify-content: space-around;
            border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 1000;
        }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        .game-card {
            background: rgba(255, 255, 255, 0.92); border-radius: 25px;
            padding: 20px; border: 2px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center;
            backdrop-filter: blur(8px);
        }

        .city-img {
            width: 100%; height: 200px; object-fit: cover;
            border-radius: 20px; border: 2px solid var(--gold); margin-bottom: 15px;
        }

        .btn {
            background: var(--emerald); color: var(--gold);
            border: 2px solid var(--gold); padding: 12px;
            border-radius: 12px; width: 100%; margin: 6px 0;
            font-family: 'Aref Ruqaa'; font-size: 1.1em; cursor: pointer;
        }

        .btn-travel { background: var(--accent); color: white; }

        #adminPanel {
            display: none; background: white; border-radius: 20px;
            padding: 20px; border: 4px double var(--gold); margin-top: 20px;
        }

        .admin-btn-float {
            position: fixed; bottom: 20px; left: 20px; width: 50px; height: 50px;
            background: var(--emerald); border-radius: 50%; display: none;
            align-items: center; justify-content: center; font-size: 24px; z-index: 1000;
        }
    </style>
</head>
<body id="gameBody">

    <div class="status-bar">
        <div>الذهب: <span id="goldText">500</span> 💰</div>
        <div>الموقع: <span id="locText">غرداية</span> 📍</div>
    </div>

    <div class="container">
        <div class="game-card">
            <img id="currentCityImg" src="https://via.placeholder.com/400x200?text=Sultana+Atlas" class="city-img">
            <h2 id="cityTitle">غرداية</h2>
            <p id="cityDesc">توابل قوية وزرابي ثمينة.</p>
            <div id="cargoInfo" style="font-weight: bold; color: var(--accent); margin: 10px 0;">المخزن: فارغ</div>

            <button class="btn" onclick="trade('buy')">شراء السلعة المحلية 💰</button>
            <button class="btn" onclick="trade('sell')">بيع ما أحمله ⚖️</button>
            
            <h4 style="margin: 15px 0 5px;">وجهة القافلة القادمة:</h4>
            <select id="travelSelect" class="btn" style="background: white; color: black;"></select>
            <button class="btn btn-travel" onclick="travel()">انطلاق القافلة 🐪</button>
        </div>

        <div id="adminPanel">
            <h3 style="text-align:center">👑 لوحة السلطانة مها</h3>
            <p>رفع صورة لهذه الولاية:</p>
            <input type="file" onchange="uploadCityImg(this)">
            <button class="btn" onclick="toggleAdmin()">إغلاق</button>
        </div>
    </div>

    <div id="adminBtn" class="admin-btn-float" onclick="toggleAdmin()">👑</div>

<script>
    const tg = window.Telegram.WebApp;
    const MY_ID = 8421694319;

    const firebaseConfig = { databaseURL: "https://allahfirst-b9c52-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // البيانات التي قدمتيها يا مها
    const atlasData = {
        "غرداية": { item: "توابل وزرابي", price: 80, desc: "توابل غرداية هي الأقوى، والزرابي سلعة لا تفسد." },
        "تلمسان": { item: "منسوجات وحرير", price: 150, desc: "قماش فاخر ولباس تقليدي أصيل." },
        "وهران": { item: "ذهب ومجوهرات", price: 500, desc: "قطب الذهب والحلي والمجوهرات." },
        "برج بوعريريج": { item: "قمح وآلات", price: 120, desc: "مخزن الحبوب وعاصمة التجارة والتجهيزات." },
        "الجزائر العاصمة": { item: "سلع بحرية", price: 200, desc: "ميناء المحروسة ونقطة التقاء السلع." },
        "قسنطينة": { item: "نحاس ومقطرات", price: 180, desc: "نحاس منقوش وماء ورد مركز." },
        "عنابة": { item: "مرجان", price: 400, desc: "سلعة نادرة وقيمة عالية جداً." },
        "تمنراست": { item: "فضة وبخور", price: 250, desc: "مركز تجارة التروك والفضة التارقية." },
        "تيزي وزو": { item: "زيت وفخار", price: 90, desc: "زيت زيتون أصيل في ظروف جلدية." },
        "باتنة": { item: "صوف وجلود", price: 70, desc: "صوف وجلود تمون الشمال والجنوب." }
    };

    let state = {
        gold: 1000,
        currentCity: "غرداية",
        cargo: null,
        cargoBuyPrice: 0
    };

    function init() {
        if (tg.initDataUnsafe.user?.id === MY_ID) document.getElementById('adminBtn').style.display = 'flex';
        
        const select = document.getElementById('travelSelect');
        Object.keys(atlasData).forEach(city => {
            let opt = document.createElement('option');
            opt.value = city; opt.innerText = city;
            select.appendChild(opt);
        });
        updateUI();
    }

    function updateUI() {
        const data = atlasData[state.currentCity];
        document.getElementById('goldText').innerText = state.gold;
        document.getElementById('locText').innerText = state.currentCity;
        document.getElementById('cityTitle').innerText = state.currentCity;
        document.getElementById('cityDesc').innerText = data.desc;
        document.getElementById('cargoInfo').innerText = state.cargo ? "المخزن: " + state.cargo : "المخزن: فارغ";
        
        db.ref('cities_images/' + state.currentCity).once('value', snap => {
            if(snap.val()) document.getElementById('currentCityImg').src = snap.val();
        });
    }

    function trade(type) {
        const data = atlasData[state.currentCity];
        if (type === 'buy' && !state.cargo) {
            if (state.gold >= data.price) {
                state.gold -= data.price;
                state.cargo = data.item;
                state.cargoBuyPrice = data.price;
                tg.HapticFeedback.notificationOccurred('success');
            }
        } else if (type === 'sell' && state.cargo) {
            // ربح عشوائي بين 20% إلى 50% فوق سعر الشراء
            let profit = Math.floor(state.cargoBuyPrice * (1.2 + Math.random() * 0.3));
            state.gold += profit;
            state.cargo = null;
            tg.HapticFeedback.impactOccurred('heavy');
            alert("بعت السلعة بربح قدره: " + (profit - state.cargoBuyPrice) + " ذهبة");
        }
        updateUI();
    }

    function travel() {
        const nextCity = document.getElementById('travelSelect').value;
        if (nextCity === state.currentCity) return alert("أنت فيها بالفعل!");
        
        // أحجية بسيطة للسفر
        let question = "ما اسم السلعة المشهورة في " + nextCity + "؟";
        let answer = prompt(question);
        
        if (answer && atlasData[nextCity].item.includes(answer)) {
            state.currentCity = nextCity;
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        } else {
            alert("إجابة خاطئة! ضاعت القافلة في الرمال.");
        }
    }

    function toggleAdmin() {
        const p = document.getElementById('adminPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function uploadCityImg(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            db.ref('cities_images/' + state.currentCity).set(e.target.result);
            document.getElementById('currentCityImg').src = e.target.result;
            alert("تم حفظ الصورة لهذه الولاية!");
        };
        reader.readAsDataURL(input.files[0]);
    }

    tg.expand();
    init();
</script>
</body>
</html>
