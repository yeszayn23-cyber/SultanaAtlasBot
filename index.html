<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عهد السلطانة: بناء القصر</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Aref+Ruqaa:wght@700&display=swap');
        
        :root { --gold: #d4af37; --deep-blue: #0a192f; }

        body {
            font-family: 'Amiri', serif; background: #1a1a1a; color: white;
            margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* شريط بناء القصر */
        .palace-header {
            width: 100%; background: linear-gradient(to bottom, #000, #222);
            padding: 10px 0; border-bottom: 3px solid var(--gold); text-align: center;
        }
        .progress-container {
            width: 80%; height: 12px; background: #444; margin: 8px auto;
            border-radius: 10px; border: 1px solid var(--gold); overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--gold), #fff); transition: 0.5s; }

        /* منطقة العملات والعبارات */
        .stats-zone { margin: 10px; text-align: center; }
        #coin-count { color: var(--gold); font-size: 1.5em; font-weight: bold; }
        #royal-quote { font-family: 'Aref Ruqaa'; font-size: 1.1em; height: 30px; color: #ccc; }

        /* رقعة اللعب */
        .grid-container {
            width: 320px; height: 320px; background: #34495e; border-radius: 10px;
            padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            position: relative; border: 4px solid var(--gold);
        }
        .grid-cell { background: rgba(255,255,255,0.1); border-radius: 5px; }

        /* السلع (التمر والذهب) */
        .tile {
            position: absolute; width: 70px; height: 70px; border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
            transition: all 0.15s ease-in-out; font-weight: bold; font-size: 1.2em;
        }

        /* لوحة التحكم */
        #admin-panel {
            display: none; position: fixed; inset: 0; background: #111; z-index: 100;
            padding: 20px; overflow-y: auto;
        }
        .admin-btn { background: var(--gold); color: black; border: none; padding: 10px; border-radius: 5px; margin: 5px; }

        .floating-admin { position: fixed; bottom: 20px; right: 20px; background: var(--gold); 
                         width: 45px; height: 45px; border-radius: 50%; display: flex; 
                         align-items: center; justify-content: center; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div class="palace-header">
        <div>المستوى: <span id="level-num">1</span> | بناء القصر</div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="coin-count">💰 0</div>
    </div>

    <div class="stats-zone">
        <div id="royal-quote">"اجمع التمر لتبدأ التجارة..."</div>
    </div>

    <div class="grid-container" id="grid">
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
        <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
    </div>

    <div class="floating-admin" onclick="toggleAdmin()">⚙️</div>

    <div id="admin-panel">
        <h2 style="color:var(--gold)">إعدادات الإمبراطورية</h2>
        <p>تغيير لون الخلفية:</p>
        <input type="color" onchange="document.body.style.background = this.value">
        <hr>
        <div id="upload-controls"></div>
        <button class="admin-btn" onclick="toggleAdmin()">إغلاق</button>
    </div>

<script>
    // إعدادات Firebase وتليجرام
    const tg = window.Telegram.WebApp;
    const MY_ID = 8421694319; 
    const firebaseConfig = { databaseURL: "https://allahfirst-b9c52-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let board = Array(4).fill().map(() => Array(4).fill(0));
    let score = 0;
    let images = {};

    // توليد أزرار رفع الصور في لوحة الإدارة
    const levels = [2, 4, 8, 16, 32, 64, 128, 256, 512, 1024, 2048];
    levels.forEach(lvl => {
        let div = document.createElement('div');
        div.innerHTML = `صورة رقم ${lvl}: <input type="file" onchange="uploadImg(this, ${lvl})">`;
        document.getElementById('upload-controls').appendChild(div);
    });

    function uploadImg(input, num) {
        const reader = new FileReader();
        reader.onload = (e) => db.ref('assets/' + num).set(e.target.result);
        reader.readAsDataURL(input.files[0]);
    }

    function toggleAdmin() {
        if(tg.initDataUnsafe.user?.id === MY_ID) {
            let p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        } else {
            alert("هذه اللوحة مخصصة للسلطانة فقط!");
        }
    }

    // منطق اللعبة
    function initGame() {
        addTile(); addTile();
        drawBoard();
    }

    function addTile() {
        let empty = [];
        for(let r=0; r<4; r++) for(let c=0; c<4; c++) if(board[r][c]===0) empty.push({r,c});
        if(empty.length) {
            let {r,c} = empty[Math.floor(Math.random()*empty.length)];
            board[r][c] = 2;
        }
    }

    function drawBoard() {
        const container = document.getElementById('grid');
        document.querySelectorAll('.tile').forEach(t => t.remove());
        board.forEach((row, r) => {
            row.forEach((val, c) => {
                if(val !== 0) {
                    let tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.style.top = (r * 77 + 10) + 'px';
                    tile.style.left = (c * 77 + 10) + 'px';
                    if(images[val]) {
                        tile.style.backgroundImage = `url(${images[val]})`;
                        tile.innerText = "";
                    } else {
                        tile.style.backgroundColor = "#d4af37";
                        tile.innerText = val;
                    }
                    container.appendChild(tile);
                }
            });
        });
        document.getElementById('coin-count').innerText = "💰 " + score;
        let progress = (score / 5000) * 100;
        document.getElementById('progress-bar').style.width = Math.min(progress, 100) + "%";
    }

    // تحريك السلع (دمج)
    function move(direction) {
        let moved = false;
        // منطق التحريك والدمج (مبسط)
        // ... (هنا يتم إضافة خوارزمية 2048 التقليدية)
        // عند حدوث دمج: score += mergedValue;
        if(moved) {
            addTile();
            drawBoard();
        }
    }

    // مراقبة قاعدة البيانات للصور
    db.ref('assets').on('value', snap => {
        images = snap.val() || {};
        drawBoard();
    });

    // التحكم باللمس
    let ts;
    document.addEventListener('touchstart', e => ts = e.touches[0]);
    document.addEventListener('touchend', e => {
        let te = e.changedTouches[0];
        let dx = te.clientX - ts.clientX;
        let dy = te.clientY - ts.clientY;
        if(Math.abs(dx) > Math.abs(dy)) {
            if(dx > 0) /* move right */; else /* move left */;
        } else {
            if(dy > 0) /* move down */; else /* move up */;
        }
        // تجريبياً للآن:
        score += 10;
        addTile();
        drawBoard();
    });

    tg.expand();
    initGame();
</script>
</body>
</html>
