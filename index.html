<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أطلس السلطانة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&display=swap');
        
        :root {
            --gold-gradient: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --dark-gold: #8b6b23;
            --emerald: #046307; /* لون جزائري أصيل */
            --creamy: #fdfaf1;
            --bg-color: var(--creamy);
            --text-color: #2c3e50;
        }

        body { 
            font-family: 'Amiri', serif; 
            background-color: var(--bg-color); 
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
            margin: 0; padding: 15px; text-align: center;
        }

        .logo { font-family: 'Aref Ruqaa', serif; font-size: 3em; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; }

        .city-card {
            background: #fff; border-radius: 20px; padding: 15px; margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); border-right: 8px solid var(--emerald);
        }

        .city-img { width: 100%; border-radius: 15px; height: 200px; object-fit: cover; }

        .btn-explore {
            background: var(--gold-gradient); border: none; padding: 12px 25px;
            border-radius: 25px; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        #adminPanel { background: #eee; padding: 15px; border-radius: 15px; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <h1 class="logo">أطلس السلطانة</h1>
    <p>مرحباً بكِ يا سلطانة في رحلة عبر ولايات الجزائر</p>

    <div id="atlasGrid">
        <div class="city-card">
            <img src="https://i.ibb.co/vz6mPZ9/Bordj.jpg" class="city-img">
            <h3>برج بوعريريج</h3>
            <p>عاصمة البيبان والجمال.. موطن الكرم.</p>
            <button class="btn-explore" onclick="alert('قريباً: استكشاف معالم البرج')">استكشاف 🏰</button>
        </div>

        <div class="city-card">
            <img src="https://i.ibb.co/m0fH8YV/Tlemcen.jpg" class="city-img">
            <h3>تلمسان</h3>
            <p>لؤلؤة المغرب العربي ومدينة الفن والتاريخ.</p>
            <button class="btn-explore" onclick="alert('قريباً: زيارة المنصورة')">استكشاف 🕌</button>
        </div>
    </div>

    <div id="adminPanel">
        <h3>🛠 لوحة تحكم السلطانة</h3>
        <input type="text" id="cityName" placeholder="اسم الولاية" style="width:80%; padding:10px; margin:5px;">
        <input type="text" id="cityImg" placeholder="رابط الصورة" style="width:80%; padding:10px; margin:5px;">
        <button onclick="addCity()" class="btn-explore">إضافة ولاية جديدة</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = 8421694319; // معرفكِ الخاص

    // ربط فايبرس الخاص بكِ (نفس الذي استخدمتيه في الله أولاً)
    const firebaseConfig = { databaseURL: "https://allahfirst-b9c52-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    if (tg.initDataUnsafe.user?.id === ADMIN_ID) {
        document.getElementById('adminPanel').style.display = 'block';
    }

    function addCity() {
        const name = document.getElementById('cityName').value;
        const img = document.getElementById('cityImg').value;
        if(name && img) {
            db.ref('atlas_cities/').push({ name, img });
            alert('تمت إضافة الولاية للأطلس!');
        }
    }
</script>
</body>
</html>
